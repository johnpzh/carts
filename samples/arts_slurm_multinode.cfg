[ARTS]
# Slurm template for real multinode CARTS benchmark runs.
# The benchmark runner rewrites worker_threads, node_count, launcher, and
# counter_folder for each build/run. Keep the network settings explicit here so
# multinode runs do not inherit the single-node local profile silently.

worker_threads=64

# In Slurm mode, --threads is the worker-thread contract by default. The
# benchmark harness requests sender and receiver progress threads on top of
# that worker count when setting SLURM_CPUS_PER_TASK. Set
# CARTS_SLURM_THREAD_BUDGET=total only for experiments that intentionally treat
# --threads as the total runtime thread budget.
sender_threads=1
receiver_threads=1
port_count=1

# Slurm cpusets on mi300x expose 60 PUs to each rank even when the benchmark
# sweep requests 64 configured threads. Keep the 64-thread benchmark contract
# but avoid hard affinity failures from trying to pin beyond the visible PU set.
pin=0
worker_init_deque_size=2048

# ARTS interprets this as log2(entries): 16 means 65536 entries.
route_table_size=16

launcher=slurm
node_count=2

protocol=tcp
default_ports=34739

core_dump=1
counter_folder=./counters
counter_capture_interval=100
kill_mode=0
