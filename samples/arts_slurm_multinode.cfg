[ARTS]
# Slurm template for real multinode CARTS benchmark runs.
# The benchmark runner rewrites worker_threads, node_count, launcher, and
# counter_folder for each build/run. Keep the network settings explicit here so
# multinode runs do not inherit the single-node local profile silently.

worker_threads=64

# In Slurm mode, --threads is also SLURM_CPUS_PER_TASK. ARTS subtracts sender
# and receiver threads from that total on multinode runs, so a --threads 64 run
# is 64 CPUs per rank including these network threads.
sender_threads=1
receiver_threads=1
port_count=1

pin=1
worker_init_deque_size=2048

# ARTS interprets this as log2(entries): 16 means 65536 entries.
route_table_size=16

launcher=slurm
node_count=2

protocol=tcp
default_ports=34739

core_dump=1
counter_folder=./counters
counter_capture_interval=100
kill_mode=0
