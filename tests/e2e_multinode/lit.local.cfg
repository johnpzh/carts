# -*- Python -*-
# Multinode E2E tests compile with --distributed-db and run under
# samples/arts_multinode.cfg, which launches 2 local processes on TCP loopback.
#
# Tests live here only AFTER the underlying sample passes single-node and
# Phase 5 (SDE distributed-scope gates) marks its primary DBs distributed.
# Adding a multinode test before that point produces no signal — the runtime
# silently runs single-node when no DB is marked distributed.

config.suffixes = [".c", ".cpp"]
